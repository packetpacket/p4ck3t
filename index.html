<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Sistem Paket Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f8f9fa; padding: 10px; font-size: 14px; }
    .card { max-width: 700px; margin: auto; border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .nav-pills .nav-link { border-radius: 10px; font-weight: bold; }
    #reader { width: 100%; display: none; border-radius: 10px; border: 2px solid #0d6efd; margin-bottom: 10px; }
    .table-responsive { max-height: 400px; overflow-y: auto; }
    .btn-delete { color: #dc3545; cursor: pointer; }
    .btn-delete:hover { color: #a71d2a; }
  </style>
</head>
<body>

<div class="card p-3">
  <ul class="nav nav-pills nav-fill mb-3">
    <li class="nav-item"><button class="nav-link active" id="btnTabMasuk" onclick="gantiTab('masuk')">📦 Masuk</button></li>
    <li class="nav-item"><button class="nav-link" id="btnTabKeluar" onclick="gantiTab('keluar')">📤 Keluar</button></li>
  </ul>

  <button id="btnTambah" class="btn btn-primary w-100 mb-3 fw-bold" onclick="showForm()">➕ Tambah Data</button>

  <!-- FORM CONTAINER -->
  <div id="form-container" style="display:none;" class="border p-3 rounded mb-3 bg-white">
    <div id="area-masuk">
      <div id="reader"></div>
      <button class="btn btn-dark btn-sm w-100 mb-2" onclick="toggleScanner()">📷 Scan Barcode</button>
      <form id="formMasuk" onsubmit="event.preventDefault(); kirimData('masuk');">
        <input type="text" id="resi" name="resi" class="form-control mb-2" placeholder="Nomor Resi" required>
        <input type="text" name="alamatMasuk" class="form-control mb-2" placeholder="Nama / Alamat">
        <input type="number" name="jumlahMasuk" class="form-control mb-3" value="1">
        <button type="submit" class="btn btn-primary w-100">Simpan Paket Masuk</button>
      </form>
    </div>

    <div id="area-keluar" style="display:none;">
      <form id="formKeluar" onsubmit="event.preventDefault(); kirimData('keluar');">
        <input type="text" name="pemilik" class="form-control mb-2" placeholder="Pemilik Paket" required>
        <input type="text" name="pengambil" class="form-control mb-2" placeholder="Nama Pengambil" required>
        <div class="row mb-3"><div class="col"><input type="number" name="jumlahFnb" class="form-control" placeholder="FnB"></div><div class="col"><input type="number" name="jumlahPaket" class="form-control" placeholder="Paket"></div></div>
        <button type="submit" class="btn btn-primary w-100">Simpan Paket Keluar</button>
      </form>
    </div>
    <button class="btn btn-link btn-sm w-100 text-muted" onclick="hideForm()">Batal</button>
  </div>

  <!-- TABEL DATA -->
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h6 class="fw-bold mb-0">Riwayat Data</h6>
    <button class="btn btn-sm btn-outline-secondary" onclick="muatData()">🔄 Refresh</button>
  </div>
  
  <div id="loading" class="text-center my-3" style="display:none;">Memuat data...</div>
  
  <div class="table-responsive">
    <table class="table table-hover table-sm">
      <thead class="table-light" id="th"></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykEPWSKCuyU3I6_Z3x_eFMImOTVuL3YC8zIL6TkE6q9BjOhTLwvpAtaKYggeW2ijCfeg/exec";
  let mode = 'masuk';

  function gantiTab(t) {
    mode = t;
    document.getElementById('btnTabMasuk').classList.toggle('active', t === 'masuk');
    document.getElementById('btnTabKeluar').classList.toggle('active', t === 'keluar');
    document.getElementById('area-masuk').style.display = t === 'masuk' ? 'block' : 'none';
    document.getElementById('area-keluar').style.display = t === 'keluar' ? 'block' : 'none';
    hideForm(); muatData();
  }

  function showForm() { document.getElementById('form-container').style.display = 'block'; document.getElementById('btnTambah').style.display = 'none'; }
  function hideForm() { document.getElementById('form-container').style.display = 'none'; document.getElementById('btnTambah').style.display = 'block'; }

  async function muatData() {
    document.getElementById('loading').style.display = 'block';
    try {
      const r = await fetch(`${SCRIPT_URL}?type=${mode}`);
      const d = await r.json();
      
      let h = mode === 'masuk' ? '<tr><th>Resi</th><th>Nama</th><th>Aksi</th></tr>' : '<tr><th>Pemilik</th><th>Ambil</th><th>Aksi</th></tr>';
      document.getElementById('th').innerHTML = h;

      let b = '';
      // Mulai dari index 1 untuk melewati Header Spreadsheet
      for (let i = 1; i < d.length; i++) {
        let rowNum = i + 1; // Lokasi baris asli di Google Sheets
        b += `<tr>
                <td>${d[i][0]}</td>
                <td>${mode === 'masuk' ? d[i][1] : d[i][2]}</td>
                <td><span class="btn-delete fw-bold" onclick="hapusData(${rowNum})">🗑️</span></td>
              </tr>`;
      }
      document.getElementById('tb').innerHTML = b;
    } catch (e) { alert("Gagal memuat data"); }
    document.getElementById('loading').style.display = 'none';
  }

  async function hapusData(num) {
    if(!confirm("Hapus baris ini dari Spreadsheet?")) return;
    try {
      await fetch(`${SCRIPT_URL}?action=delete&type=${mode}&row=${num}`, { mode: 'no-cors' });
      alert("Permintaan hapus terkirim. Data akan hilang setelah refresh.");
      muatData();
    } catch(e) { alert("Gagal menghapus"); }
  }

  function kirimData(t) {
    const f = document.getElementById(t === 'masuk' ? 'formMasuk' : 'formKeluar');
    let fd = new FormData(f); fd.append("formType", t);
    fetch(SCRIPT_URL, { method: 'POST', body: fd, mode: 'no-cors' }).then(() => {
      f.reset(); hideForm(); muatData();
    });
  }

  let scanner; let isScanning = false;
  function toggleScanner() {
    if (!isScanning) {
      document.getElementById('reader').style.display = 'block';
      scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
      scanner.render((t) => { document.getElementById('resi').value = t; toggleScanner(); });
      isScanning = true;
    } else {
      scanner.clear().then(() => { document.getElementById('reader').style.display = 'none'; isScanning = false; });
    }
  }

  window.onload = muatData;
</script>
</body>
</html>
